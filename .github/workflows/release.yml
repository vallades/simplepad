# =============================================================================
# SimplePad — Release
# Triggers on version tags (v1.0.0) or manual workflow_dispatch.
# Builds installers on 3 OSes and attaches them to a GitHub Release.
# =============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1). Leave empty to use package.json version.'
        required: false
        type: string

permissions:
  contents: write # create/update GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  HUSKY: '0'
  # Code signing (optional — see docs/DISTRIBUTION.md):
  #   CSC_LINK, CSC_KEY_PASSWORD          → Windows Authenticode / mac Developer ID
  #   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID → notarization
  # Secrets are exported only when non-empty in the Package step (never force-sign).
  # Leave auto-discovery off unless CSC_LINK is present.
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  # ---------------------------------------------------------------------------
  # Build platform installers (parallel matrix)
  # ---------------------------------------------------------------------------
  build:
    name: Package (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    # Git Bash on all OSes — Windows default is PowerShell, which cannot parse
    # bash `if [ -n ... ]` (ParserError: Missing '(' after 'if').
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder_args: --linux
            artifact_name: release-linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*-linux*.yml
              dist/*-linux*.yaml
              dist/*.blockmap
          - os: windows-latest
            platform: win
            builder_args: --win
            artifact_name: release-windows
            artifact_glob: |
              dist/*.exe
              dist/latest.yml
              dist/*.blockmap
          - os: macos-latest
            platform: mac
            builder_args: --mac
            artifact_name: release-macos
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
              dist/latest-mac.yml
              dist/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron & electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-release-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-release-${{ runner.os }}-${{ runner.arch }}-
            electron-release-${{ runner.os }}-
            electron-${{ runner.os }}-

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::npm ci (${{ matrix.platform }})"
          npm ci
          echo "::endgroup::"
          echo "node=$(node -v) npm=$(npm -v)"

      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::electron-vite build"
          npx electron-vite build
          echo "::endgroup::"

      - name: Package installers
        shell: bash
        # IMPORTANT: do NOT map secrets.CSC_LINK via env: when empty — GitHub injects ""
        # and electron-builder treats it as a certificate path → "…/simplepad not a file".
        # Must use bash (not PowerShell) for `if [ -n ... ]` on windows-latest.
        run: |
          set -euo pipefail
          echo "Packaging platform=${{ matrix.platform }} args=${{ matrix.builder_args }}"
          if [ -n "${{ secrets.CSC_LINK }}" ]; then
            export CSC_LINK="${{ secrets.CSC_LINK }}"
            export CSC_KEY_PASSWORD="${{ secrets.CSC_KEY_PASSWORD }}"
            echo "Code signing: CSC_LINK is set"
          else
            echo "Code signing: unsigned build (no CSC_LINK secret)"
          fi
          if [ -n "${{ secrets.APPLE_ID }}" ]; then
            export APPLE_ID="${{ secrets.APPLE_ID }}"
            export APPLE_APP_SPECIFIC_PASSWORD="${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}"
            export APPLE_TEAM_ID="${{ secrets.APPLE_TEAM_ID }}"
            echo "Apple notarization credentials: present"
          fi
          npx electron-builder ${{ matrix.builder_args }} --publish never
          echo "dist/ contents:"
          ls -lah dist/ || true

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_id }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Create / update GitHub Release with all assets
  # ---------------------------------------------------------------------------
  publish:
    name: Publish GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: List release assets
        run: |
          echo "Assets to publish:"
          find release-assets -type f | sort
          # Flatten into a single directory for the release action
          mkdir -p dist-upload
          find release-assets -type f -exec cp -v {} dist-upload/ \;
          ls -lah dist-upload

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # Manual run without tag input — use package version
            VER=$(node -p "require('./package.json').version")
            echo "name=v${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: SimplePad ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
          generate_release_notes: true
          body: |
            ## SimplePad ${{ steps.tag.outputs.name }}

            Instaladores multiplataforma gerados automaticamente pelo workflow **Release**.

            Veja o [CHANGELOG](https://github.com/vallades/simplepad/blob/main/CHANGELOG.md) para detalhes.

            ### Instalação rápida
            - **macOS:** `.dmg` ou `.zip`
            - **Windows:** `-setup.exe` (NSIS) ou `-portable.exe`
            - **Linux:** `.AppImage` ou `.deb`

            Os arquivos `latest*.yml` são usados pelo **electron-updater**.
          files: |
            dist-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

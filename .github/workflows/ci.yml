# =============================================================================
# SimplePad — Continuous Integration
# Runs on every push/PR to main: lint, typecheck, tests, multi-OS installers.
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege for CI (release workflow uses contents: write)
permissions:
  contents: read

concurrency:
  # One active CI per branch/PR.
  # On `main`, do NOT cancel in-progress runs — electron-builder (especially
  # macOS DMG/ZIP) can take a long time; canceling mid-package surfaces as
  # "Error: The operation was canceled." even after a successful build.
  # On other refs (PRs), cancel outdated runs to save minutes.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Skip husky hooks in CI
  HUSKY: '0'
  # Do not attempt code signing in PR/CI builds
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  # Electron download caches (workspace-scoped for actions/cache)
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint & Type Check (Ubuntu, fast feedback)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci
          echo "::endgroup::"
          node -v
          npm -v

      - name: ESLint
        run: |
          echo "Running ESLint…"
          npm run lint

      - name: TypeScript (strict)
        run: |
          echo "Running TypeScript typecheck…"
          npm run typecheck

  # ---------------------------------------------------------------------------
  # Job 2 — Unit tests + coverage (parallel with lint)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci
          echo "::endgroup::"

      - name: Run Vitest with coverage
        run: |
          echo "Running tests with coverage…"
          npm run test:coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 3 — Production build + platform installers (matrix)
  # Waits for lint + test so we do not waste builder minutes on broken code.
  # macOS DMG is the slowest step — timeout is 60m to avoid false cancels.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder_args: --linux
            artifact_name: simplepad-linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.yml
              dist/*.yaml
              dist/*.blockmap
          - os: windows-latest
            platform: win
            builder_args: --win
            artifact_name: simplepad-windows
            artifact_glob: |
              dist/*.exe
              dist/*.yml
              dist/*.yaml
              dist/*.blockmap
          - os: macos-latest
            platform: mac
            builder_args: --mac
            artifact_name: simplepad-macos
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
              dist/*.yml
              dist/*.yaml
              dist/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # npm (from setup-node) + Electron binary + electron-builder toolchains
      - name: Cache Electron & electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
            ~/.cache/electron
            ~/.cache/electron-builder
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-
            electron-${{ runner.os }}-

      - name: Install dependencies
        run: |
          echo "::group::npm ci (platform=${{ matrix.platform }})"
          npm ci
          echo "::endgroup::"
          echo "node=$(node -v) npm=$(npm -v) os=${{ runner.os }}"

      - name: Build app (main / preload / renderer)
        run: |
          echo "::group::electron-vite build"
          npx electron-vite build
          echo "::endgroup::"
          echo "out/ tree:"
          ls -lah out/main out/preload out/renderer 2>/dev/null || ls -lah out/ || true

      - name: Package with electron-builder (${{ matrix.platform }})
        run: |
          set -euo pipefail
          echo "════════════════════════════════════════"
          echo " Packaging SimplePad"
          echo " platform : ${{ matrix.platform }}"
          echo " os       : ${{ matrix.os }}"
          echo " args     : ${{ matrix.builder_args }}"
          echo " publish  : never"
          echo "════════════════════════════════════════"
          npx electron-builder ${{ matrix.builder_args }} --publish never
          echo "Package complete. Contents of dist/:"
          ls -lah dist/ || true

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.run_id }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  # ---------------------------------------------------------------------------
  # Aggregate status (useful for branch protection: require this single job)
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    if: always()
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: false
    steps:
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check required jobs
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "build=${{ needs.build.result }}"
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed (or were cancelled)"
            exit 1
          fi
          echo "All CI jobs passed."

# Used only when forceDevUpdateConfig=true (development / npm run dev).
# Same GitHub feed as production (app-update.yml generated by electron-builder).
#
# To test detection in dev:
# 1. Publish a GitHub Release with version > package.json (e.g. 1.2.0) + latest*.yml
# 2. OR temporarily lower "version" in package.json below the latest release
# 3. Ajuda → Verificar atualizações…
#
# NOTE: generic + /releases/latest/download/ also works for public repos, but
# the github provider matches production more closely.
provider: github
owner: vallades
repo: simplepad
private: false
releaseType: release
updaterCacheDirName: simplepad-updater
